<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signing out</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #fafafa; color: #111; margin: 0;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }
        @media (prefers-color-scheme: dark) {
            body { background: #0a0a0a; color: #f5f5f5; }
        }
        .panel { max-width: 360px; text-align: center; }
        iframe { display: none; }
        .spinner {
            margin: 16px auto;
            border: 3px solid rgba(0,0,0,0.1);
            border-top-color: #2563eb;
            border-radius: 50%;
            width: 32px; height: 32px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="panel">
    <h1>Signing you out…</h1>
    <p>We're notifying connected applications.</p>
    <div class="spinner"></div>

    {% for uri in frontchannel_uris %}
        <iframe src="{{ uri }}" sandbox="allow-same-origin allow-scripts"></iframe>
    {% endfor %}
</div>
<script>
    (function () {
        var redirect = {% match final_redirect %}{% when Some with (r) %}'{{ r }}'{% when None %}null{% endmatch %};
        setTimeout(function () {
            if (redirect) {
                window.location.replace(redirect);
            }
        }, 1500);
    })();
</script>
</body>
</html>
